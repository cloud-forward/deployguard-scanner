{{- if .Values.k8sScanner.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deployguard-scanner.fullname" . }}-k8s
  namespace: {{ include "deployguard-scanner.namespace" . }}
  labels:
    {{- include "deployguard-scanner.labels" . | nindent 4 }}
    app.kubernetes.io/component: k8s-scanner
spec:
  replicas: {{ .Values.k8sScanner.replicas }}
  selector:
    matchLabels:
      {{- include "deployguard-scanner.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: k8s-scanner
  template:
    metadata:
      labels:
        {{- include "deployguard-scanner.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: k8s-scanner
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "deployguard-scanner.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scanner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - worker
          env:
            - name: DG_CLUSTER_ID
              value: {{ include "deployguard-scanner.clusterId" . | quote }}
            - name: CLUSTER_ID
              value: {{ include "deployguard-scanner.clusterId" . | quote }}
            - name: CLUSTER_NAME
              value: {{ include "deployguard-scanner.clusterName" . | quote }}
            - name: DG_CLUSTER_NAME
              value: {{ include "deployguard-scanner.clusterName" . | quote }}
            - name: DG_API_ENDPOINT
              value: {{ include "deployguard-scanner.apiUrl" . | quote }}
            - name: API_URL
              value: {{ include "deployguard-scanner.apiUrl" . | quote }}
            - name: DG_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "deployguard-scanner.apiTokenSecretName" . }}
                  key: {{ .Values.api.existingSecretKey | quote }}
            - name: DG_SCANNER_TYPE
              value: "k8s"
          envFrom:
            - configMapRef:
                name: {{ include "deployguard-scanner.fullname" . }}-config
          resources:
            {{- toYaml .Values.k8sScanner.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - import sys; cmd = open('/proc/1/cmdline', 'rb').read().decode('utf-8', 'ignore'); sys.exit(0 if 'scanners.dg_k8s_image.scan' in cmd and 'worker' in cmd else 1)
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import sys; cmd = open('/proc/1/cmdline', 'rb').read().decode('utf-8', 'ignore'); sys.exit(0 if 'scanners.dg_k8s_image.scan' in cmd and 'worker' in cmd else 1)
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
