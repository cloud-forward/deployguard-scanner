# ─────────────────────────────────────────────────────────────────────────────
# values.yaml — 공개 설정 (git 커밋 OK)
# 민감 정보(토큰, 키)는 secrets.yaml에 분리 관리
# ─────────────────────────────────────────────────────────────────────────────

deployguard:
  clusterId: "fbba171f-d824-4f68-ab12-b6b9b2ac5a5f"
  apiToken: ""        # secrets.yaml에서 주입
  apiEndpoint: "https://analysis.deployguard.org"

image:
  repository: "189060532132.dkr.ecr.ap-northeast-2.amazonaws.com/deployguard-scanner"
  tag: "1.0.0"
  pullPolicy: Always

aws:
  region: "ap-northeast-2"
  irsa:
    enabled: false
    roleArn: ""
  credentials:
    existingSecret: ""
    accessKeyId: ""       # secrets.yaml에서 주입
    secretAccessKey: ""   # secrets.yaml에서 주입
  roleArn: ""
  externalId: ""

# ── 실행 모드 ─────────────────────────────────────────────────────────────────
# "cronjob"    : 스케줄에 맞춰 1회 실행 후 종료 (권장)
# "deployment" : 항상 켜져서 polling 대기
mode: "cronjob"

cronjob:
  schedule: "22 */4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120

deployment:
  replicas: 1

scanner:
  scanType: "full"
  iamUserFilterMode: "active_keys_only"
  iamRoleFilterMode: "k8s_related"
  ec2FilterMode: "tag_match"
  rdsFilterMode: "all"
  s3FilterMode: "all"
  saveLocalCopy: "true"
  outputDir: "/app/output"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

serviceAccount:
  create: true
  name: ""
  annotations: {}

extraEnv: []
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

imagePullSecrets:        
  - name: ecr-secret