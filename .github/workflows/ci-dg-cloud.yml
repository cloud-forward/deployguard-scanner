name: Python CI - dg-aws

on:
  push:
    branches:
      - main
    paths:
      - '../../dg-aws/**'
      - 'shared/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: dg-aws/pyproject.toml
      - name: Install dependencies
        run: |
          cd dg-cloud
          pip install .
          pip install pytest flake8
      - name: Lint
        run: |
          cd dg-cloud
          # placeholder for lint
          flake8 src
      - name: Build
        run: |
          cd dg-cloud
          python -m build
      - name: Test
        run: |
          cd dg-cloud
          pytest
