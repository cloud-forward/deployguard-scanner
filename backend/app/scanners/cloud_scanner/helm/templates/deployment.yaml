{{- if eq .Values.mode "deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deployguard-aws-scanner.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard-aws-scanner.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "deployguard-aws-scanner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "deployguard-aws-scanner.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "deployguard-aws-scanner.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: aws-scanner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Deployment는 scheduled 모드로 지속 polling
          args: ["scheduled"]
          env:
            {{- include "deployguard-aws-scanner.envs" . | nindent 12 }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: output
              mountPath: {{ .Values.scanner.outputDir }}
      volumes:
        - name: output
          emptyDir: {}
{{- end }}
