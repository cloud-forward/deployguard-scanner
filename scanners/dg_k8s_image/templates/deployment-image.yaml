{{- if .Values.imageScanner.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deployguard-scanner.fullname" . }}-image
  namespace: {{ include "deployguard-scanner.namespace" . }}
  labels:
    {{- include "deployguard-scanner.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-scanner
spec:
  replicas: {{ .Values.imageScanner.replicas }}
  selector:
    matchLabels:
      {{- include "deployguard-scanner.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: image-scanner
  template:
    metadata:
      labels:
        {{- include "deployguard-scanner.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: image-scanner
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "deployguard-scanner.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # [FIX] initContainerк°Җ trivy-cache volumeм—җ DBлҘј лӢӨмҡҙлЎңл“ңн•ң л’Ө
      # л©”мқё м»Ён…Ңмқҙл„Ҳк°Җ лҸҷмқј volumeмқ„ л§ҲмҡҙнҠён•ҳм—¬ --skip-db-update мӮ¬мҡ© к°ҖлҠҘ
      # [FIX] initContainerк°Җ trivy-cache volumeм—җ DBлҘј лӢӨмҡҙлЎңл“ңн•ң л’Ө
      # л©”мқё м»Ён…Ңмқҙл„Ҳк°Җ лҸҷмқј volumeмқ„ л§ҲмҡҙнҠён•ҳм—¬ --skip-db-update мӮ¬мҡ© к°ҖлҠҘ
      # runAsUser: 1000 мңјлЎң нҶөмқјн•ҳм—¬ к¶Ңн•ң л¬ём ң л°©м§Җ
      # cache кІҪлЎңлҘј /tmp/trivy-cache лЎң нҶөмқј (/root лҠ” user 1000 м ‘к·ј л¶Ҳк°Җ)
      initContainers:
        - name: trivy-db-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - trivy
            - image
            - --download-db-only
            - --cache-dir
            - /tmp/trivy-cache
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: trivy-cache
              mountPath: /tmp/trivy-cache
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: scanner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - worker
          env:
            - name: DG_CLUSTER_ID
              value: {{ include "deployguard-scanner.clusterId" . | quote }}
            - name: CLUSTER_ID
              value: {{ include "deployguard-scanner.clusterId" . | quote }}
            - name: CLUSTER_NAME
              value: {{ include "deployguard-scanner.clusterName" . | quote }}
            - name: DG_CLUSTER_NAME
              value: {{ include "deployguard-scanner.clusterName" . | quote }}
            - name: DG_API_ENDPOINT
              value: {{ include "deployguard-scanner.apiUrl" . | quote }}
            - name: API_URL
              value: {{ include "deployguard-scanner.apiUrl" . | quote }}
            - name: DG_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "deployguard-scanner.apiTokenSecretName" . }}
                  key: {{ .Values.api.existingSecretKey | quote }}
            - name: DG_SCANNER_TYPE
              value: "image"
            # [FIX] initContainerк°Җ DBлҘј мұ„мҡҙ л’ӨмқҙлҜҖлЎң skip-db-update нҷңм„ұнҷ”
            - name: DG_TRIVY_SKIP_DB_UPDATE
              value: "true"
            - name: TRIVY_CACHE_DIR
              value: /tmp/trivy-cache
          envFrom:
            - configMapRef:
                name: {{ include "deployguard-scanner.fullname" . }}-config
          resources:
            {{- toYaml .Values.imageScanner.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - import sys; cmd = open('/proc/1/cmdline', 'rb').read().decode('utf-8', 'ignore'); sys.exit(0 if 'scanners.dg_k8s_image.scan' in cmd and 'worker' in cmd else 1)
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import sys; cmd = open('/proc/1/cmdline', 'rb').read().decode('utf-8', 'ignore'); sys.exit(0 if 'scanners.dg_k8s_image.scan' in cmd and 'worker' in cmd else 1)
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: trivy-cache
              mountPath: /tmp/trivy-cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: trivy-cache
          emptyDir: {}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}