name: Go CI - dg-runtime

on:
  push:
    branches:
      - main
    paths:
      - 'dg-runtime/**'
      - 'shared/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: dg-runtime/go.sum
      - name: Lint
        run: |
          cd dg-runtime
          # placeholder for lint (e.g. go vet)
          go vet ./...
      - name: Build
        run: |
          cd dg-runtime
          go build ./...
      - name: Test
        run: |
          cd dg-runtime
          go test ./...
