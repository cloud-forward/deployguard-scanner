{{- if .Values.imageScanner.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "deployguard-scanner.fullname" . }}-image
  namespace: {{ include "deployguard-scanner.namespace" . }}
  labels:
    {{- include "deployguard-scanner.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-scanner
spec:
  schedule: {{ .Values.imageScanner.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.cronJob.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.cronJob.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "deployguard-scanner.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: image-scanner
          {{- with .Values.pod.annotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "deployguard-scanner.serviceAccountName" . }}
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: scanner
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - scheduled
              env:
                # 필수: Helm values에서 주입
                - name: DG_CLUSTER_ID
                  value: {{ include "deployguard-scanner.clusterId" . | quote }}
                - name: CLUSTER_ID
                  value: {{ include "deployguard-scanner.clusterId" . | quote }}
                - name: CLUSTER_NAME
                  value: {{ include "deployguard-scanner.clusterName" . | quote }}
                - name: DG_CLUSTER_NAME
                  value: {{ include "deployguard-scanner.clusterName" . | quote }}
                - name: DG_API_ENDPOINT
                  value: {{ include "deployguard-scanner.apiUrl" . | quote }}
                - name: API_URL
                  value: {{ include "deployguard-scanner.apiUrl" . | quote }}
                - name: DG_API_TOKEN
                  value: {{ include "deployguard-scanner.apiToken" . | quote }}
                
                # 스캐너 타입
                - name: DG_SCANNER_TYPE
                  value: "image"
              envFrom:
                - configMapRef:
                    name: {{ include "deployguard-scanner.fullname" . }}-config
              resources:
                {{- toYaml .Values.imageScanner.resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                # Trivy가 임시 파일 쓰기 필요
                readOnlyRootFilesystem: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: trivy-cache
                  mountPath: /root/.cache/trivy
          volumes:
            - name: tmp
              emptyDir: {}
            - name: trivy-cache
              emptyDir: {}
          {{- with .Values.pod.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.pod.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.pod.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
