# ============================================================
# DeployGuard Scanner Configuration
# ============================================================

# 필수 설정 (설치 시 반드시 제공해야 함)
# clusterId는 기본값 없이 배포 시점에 반드시 전달해야 합니다.
# 예시:
# helm upgrade --install deployguard-scanner ./scanners/dg_k8s_image \
#   --set clusterId=<registered-cluster-id> \
#   --set api.existingSecret=<api-token-secret>
clusterId: ""
clusterName: ""         # 클러스터 표시 이름 (없으면 clusterId 사용)

# DeployGuard API 설정
api:
  endpoint: "https://analysis.deployguard.org"
  url: ""               # deprecated alias
  # API 토큰은 실제 배포 시 Secret으로 제공해야 합니다.
  # 권장: api.existingSecret 에 사전 생성한 Secret 이름을 전달
  # 대안: api.token 을 --set/별도 values 파일로 전달하여 Secret 생성
  token: ""
  existingSecret: ""
  existingSecretKey: "api-token"

# 스캐너 이미지 설정
image:
  repository: 189060532132.dkr.ecr.ap-northeast-2.amazonaws.com/deployguard-agent-scanner
  tag: "latest"
  pullPolicy: Always

# 이미지 Pull Secret (private registry 사용 시)
imagePullSecrets: []
# - name: regcred

# ============================================================
# K8s Scanner 설정
# ============================================================
k8sScanner:
  enabled: true
  
  replicas: 1
  
  # 네임스페이스 필터링
  namespaces: []                    # 빈 배열 = 모든 네임스페이스
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
  includeSystemNamespaces: false    # kube-system 포함 여부
  
  # 리소스 제한
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ============================================================
# Image Scanner 설정
# ============================================================
imageScanner:
  enabled: true
  
  replicas: 1
  
  # Trivy 설정
  trivy:
    enabled: true
    severity: "CRITICAL,HIGH,MEDIUM,LOW"
    timeout: "10m"
  
  # EPSS 점수 조회
  epss:
    enabled: true
  
  # 최대 스캔 이미지 수
  maxImagesPerScan: 100
  
  # 리소스 제한 (Image 스캔은 더 많은 리소스 필요)
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# ============================================================
# 공통 설정
# ============================================================

orchestration:
  pendingPath: "/api/v1/scans/pending"

# 네임스페이스 (스캐너가 설치될 네임스페이스)
namespace: deployguard

# ServiceAccount 설정
serviceAccount:
  create: true
  name: deployguard-scanner
  annotations: {}

# RBAC 설정
rbac:
  create: true

# Pod 설정
pod:
  annotations: {}
  labels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

probes:
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 5
    failureThreshold: 3

# 로컬 저장 설정 (디버깅용)
localOutput:
  enabled: false
  path: /app/output

# 로깅 레벨
logLevel: INFO
