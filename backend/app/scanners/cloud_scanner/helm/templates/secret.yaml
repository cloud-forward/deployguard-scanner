{{/* DeployGuard API Token Secret */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deployguard-aws-scanner.dgSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard-aws-scanner.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-token: {{ .Values.deployguard.apiToken | required "deployguard.apiToken is required" | quote }}
{{- if and (not .Values.aws.credentials.existingSecret) .Values.aws.credentials.accessKeyId }}
---
{{/* AWS Credentials Secret (existingSecret 미사용 시 자동 생성) */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deployguard-aws-scanner.fullname" . }}-aws-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "deployguard-aws-scanner.labels" . | nindent 4 }}
type: Opaque
stringData:
  aws-access-key-id: {{ .Values.aws.credentials.accessKeyId | quote }}
  aws-secret-access-key: {{ .Values.aws.credentials.secretAccessKey | required "aws.credentials.secretAccessKey is required when accessKeyId is set" | quote }}
{{- end }}
