version: '3.8'

services:
  scanner:
    build: .
    environment:
      - CLUSTER_ID=${CLUSTER_ID:-test-cluster}
      - DG_API_ENDPOINT=${DG_API_ENDPOINT:-https://analysis.deployguard.org}
      - API_URL=${API_URL:-https://analysis.deployguard.org}
      - DG_SCANNER_TYPE=${DG_SCANNER_TYPE:-all}
      - DG_SAVE_LOCAL_COPY=true
      - DG_OUTPUT_DIR=/app/output
    volumes:
      # kubeconfig 마운트 (로컬 테스트용)
      - ${HOME}/.kube/config:/root/.kube/config:ro
      # 출력 디렉토리
      - ./output:/app/output
    command: ["scheduled"]

  # K8s만 스캔
  scanner-k8s:
    build: .
    environment:
      - CLUSTER_ID=${CLUSTER_ID:-test-cluster}
      - DG_API_ENDPOINT=${DG_API_ENDPOINT:-https://analysis.deployguard.org}
      - API_URL=${API_URL:-https://analysis.deployguard.org}
      - DG_SCANNER_TYPE=k8s
      - DG_SAVE_LOCAL_COPY=true
    volumes:
      - ${HOME}/.kube/config:/root/.kube/config:ro
      - ./output:/app/output
    command: ["scheduled"]
    profiles:
      - k8s-only

  # Image만 스캔
  scanner-image:
    build: .
    environment:
      - CLUSTER_ID=${CLUSTER_ID:-test-cluster}
      - DG_API_ENDPOINT=${DG_API_ENDPOINT:-https://analysis.deployguard.org}
      - API_URL=${API_URL:-https://analysis.deployguard.org}
      - DG_SCANNER_TYPE=image
      - DG_SAVE_LOCAL_COPY=true
      - DG_TRIVY_ENABLED=true
    volumes:
      - ${HOME}/.kube/config:/root/.kube/config:ro
      - ./output:/app/output
      # Docker socket (이미지 pull용)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["scheduled"]
    profiles:
      - image-only
