apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deployguard-scanner.fullname" . }}-config
  namespace: {{ include "deployguard-scanner.namespace" . }}
  labels:
    {{- include "deployguard-scanner.labels" . | nindent 4 }}
data:
  # K8s Scanner 설정
  DG_EXCLUDE_NAMESPACES: {{ .Values.k8sScanner.excludeNamespaces | join "," | quote }}
  DG_INCLUDE_SYSTEM_NAMESPACES: {{ .Values.k8sScanner.includeSystemNamespaces | quote }}
  {{- if .Values.k8sScanner.namespaces }}
  DG_NAMESPACES: {{ .Values.k8sScanner.namespaces | join "," | quote }}
  {{- end }}
  
  # Image Scanner 설정
  DG_TRIVY_ENABLED: {{ .Values.imageScanner.trivy.enabled | quote }}
  DG_TRIVY_SEVERITY: {{ .Values.imageScanner.trivy.severity | quote }}
  DG_TRIVY_TIMEOUT: {{ .Values.imageScanner.trivy.timeout | quote }}
  DG_EPSS_ENABLED: {{ .Values.imageScanner.epss.enabled | quote }}
  DG_MAX_IMAGES_PER_SCAN: {{ .Values.imageScanner.maxImagesPerScan | quote }}
  
  # 공통 설정
  DG_API_ENDPOINT: {{ include "deployguard-scanner.apiUrl" . | quote }}
  DG_API_URL: {{ include "deployguard-scanner.apiUrl" . | quote }}
  DG_ENGINE_URL: {{ include "deployguard-scanner.apiUrl" . | quote }}
  DG_SCAN_POLL_PATH: {{ .Values.orchestration.pendingPath | quote }}
  DG_SAVE_LOCAL_COPY: {{ .Values.localOutput.enabled | quote }}
  DG_OUTPUT_DIR: {{ .Values.localOutput.path | quote }}
  DG_LOG_LEVEL: {{ .Values.logLevel | quote }}
